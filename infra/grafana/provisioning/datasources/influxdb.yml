apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: agritech
      defaultBucket: agritech_production
    secureJsonData:
      token: dev-token-agritech-local
    isDefault: true
    editable: true
